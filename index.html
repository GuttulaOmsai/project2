<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 {
            color: var(--accent-blue);
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 25px;
        }

        /* Navigation Sidebar */
        .sidebar {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: var(--text-main);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .nav-group {
            margin-bottom: 20px;
        }

        .nav-group-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .nav-btn {
            display: block;
            width: 100%;
            padding: 10px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .nav-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
        }

        .nav-btn.active {
            background-color: var(--accent-blue);
            color: var(--bg-primary);
            font-weight: bold;
        }

        /* Main Content Viewport */
        .main-viewport {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        /* Master Header Details Card */
        .batch-master-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            background: #131d31;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .info-pill {
            display: flex;
            flex-direction: column;
        }

        .info-pill .lbl {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .info-pill .val {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }

        /* Animation & Mimic Panel Screen */
        .mimic-panel {
            background-color: #020617;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .mimic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .reactor-id {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1rem;
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
        }

        .live-status-pill {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-status-pill::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Animated Graphic Display Area */
        .animation-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 15px 0;
            flex-grow: 1;
        }

        .vessel-graphic {
            width: 100px;
            height: 120px;
            border: 3px solid #94a3b8;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            position: relative;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vessel-fluid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            transition: all 0.5s ease;
        }

        .vessel-fluid.agitating {
            animation: wave 1s infinite linear;
        }

        @keyframes wave {
            0%, 100% { transform: skewY(0deg); }
            50% { transform: skewY(3deg); }
        }

        /* Dashboard Parameter Panels */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .param-card {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .param-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .param-value {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--text-main);
            margin-top: 4px;
        }

        /* Alerts & Alarms Display */
        .alert-box {
            background-color: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            padding: 12px 15px;
            margin-top: 15px;
            color: #fca5a5;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .alert-box.warning {
            background-color: rgba(251, 191, 36, 0.15);
            border: 1px solid var(--accent-amber);
            color: #fde047;
        }

        /* Process Steps Documentation Layout */
        .process-details-section {
            margin-top: 35px;
        }

        .process-details-section h2 {
            font-size: 1.5rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-tertiary);
            padding-bottom: 8px;
        }
        
        .material-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .material-table th, .material-table td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: left;
        }

        .material-table th {
            background-color: var(--bg-tertiary);
            color: var(--accent-blue);
            font-weight: 600;
        }

        .material-table tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .step-block {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-blue);
        }

        .step-block h4 {
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            font-family: monospace;
        }

        .sub-steps-list {
            list-style: none;
            padding-left: 5px;
        }

        .sub-steps-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .sub-steps-list li::before {
            content: "•";
            color: var(--accent-blue);
            font-weight: bold;
            position: absolute;
            left: 0;
            top: 0;
            font-size: 1.2rem;
        }

        .highlight-text {
            color: var(--accent-amber);
            font-weight: 600;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                width: 100%;
                max-height: none;
            }
        }
    </style>
</head>

        // Engine Logic
        function switchStage(stageKey) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.getAttribute('onclick').includes(stageKey));
            if(activeBtn) activeBtn.classList.add('active');

            const data = processDatabase[stageKey];
            const viewport = document.getElementById('stage-viewport');

            let paramCardsHtml = '';
            data.params.forEach(p => {
                paramCardsHtml += `
                    <div class="param-card">
                        <div class="param-label">${p.label}</div>
                        <div class="param-value">${p.value}</div>
                    </div>
                `;
            });

            let alertsHtml = '';
            data.alerts.forEach(a => {
                alertsHtml += `
                    <div class="alert-box ${a.type === 'warning' ? 'warning' : ''}">
                        <strong>${a.type.toUpperCase()}:</strong> ${a.text}
                    </div>
                `;
            });

            let materialsTableHtml = '';
            if (data.materials && data.materials.length > 0) {
                materialsTableHtml += `
                    <table class="material-table">
                        <thead>
                            <tr>
                                <th>Raw Material Component</th>
                                <th>Process Factor</th>
                                <th>Target Charge Quantity</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                data.materials.forEach(m => {
                    materialsTableHtml += `
                        <tr>
                            <td><strong>${m.name}</strong></td>
                            <td>${m.factor}</td>
                            <td><span class="highlight-text">${m.qty}</span></td>
                        </tr>
                    `;
                });
                materialsTableHtml += `</tbody></table>`;
            }

            let stepsHtml = '';
            data.steps.forEach((s, idx) => {
                let subStepsLines = '';
                s.details.forEach(line => {
                    subStepsLines += `<li>${line}</li>`;
                });

                stepsHtml += `
                    <div class="step-block">
                        <h4>
                            <span>${s.title}</span>
                            <span class=""></span>
                        </h4>
                        <ul class="sub-steps-list">
                            ${subStepsLines}
                        </ul>
                    </div>
                `;
            });

            viewport.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h2 style="color: var(--accent-blue); font-size: 1.6rem; margin: 0;">${data.title}</h2>
                    
                </div>

                <div class="batch-master-info">
                    <div class="info-pill"><span class="lbl">Process Stage</span><span class="val">${data.stageInfo.stage}</span></div>
                    <div class="info-pill"><span class="lbl">Standard Batch Input</span><span class="val">${data.stageInfo.input}</span></div>
                    <div class="info-pill"><span class="lbl">Expected Batch Output</span><span class="val">${data.stageInfo.output}</span></div>
                </div>

                <div class="mimic-panel">

                        <div class="reactor-id">UNIT: ${data.vessel}</div>
                        <div class="live-status-pill">${data.status}</div>
                    </div>
                    <div class="animation-container">
                        <div style="text-align: center;">
                            <div class="vessel-graphic">
                                <div class="vessel-fluid ${data.agitating ? 'agitating' : ''}" style="height: ${data.fluidHeight}; background: ${data.fluidColor};"></div>
                            </div>
                            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 8px;">${data.vesselType}</div>
                        </div>
                    </div>
                    <div class="dashboard-grid">
                        ${paramCardsHtml}
                    </div>
                </div>

                ${alertsHtml}

                <div class="process-details-section">
                    <h2>I. BILL OF MATERIALS & TARGET CHARGES</h2>
                    ${materialsTableHtml || '<p style="color: var(--text-muted); font-style: italic; margin-bottom: 25px;">No raw material mass additions recorded for this step.</p>'}

                    <h2>II. DETAILED PROCESS INSTRUCTIONS</h2>
                    ${stepsHtml}
                </div>
            `;
